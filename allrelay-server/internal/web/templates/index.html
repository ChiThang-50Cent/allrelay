<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllRelay - Stream Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="dashboard">
    <div class="dashboard">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                        </svg>
                    </div>
                    <h1>AllRelay</h1>
                </div>
                <div class="connection-status" id="connectionStatus">
                    <span class="status-dot disconnected"></span>
                    <span class="status-text">Disconnected</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Connection Panel -->
            <section class="panel connection-panel">
                <div class="panel-header">
                    <h2>Connect to Phone</h2>
                    <button class="btn btn-secondary" id="scanBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="M21 21l-4.35-4.35"/>
                        </svg>
                        Scan Network
                    </button>
                </div>
                <div class="panel-body">
                    <div class="input-group">
                        <input type="text" id="phoneIP" placeholder="Enter phone IP address (e.g., 192.168.1.100)" class="input">
                        <button class="btn btn-primary" id="connectBtn">Connect</button>
                    </div>
                    <div class="phone-list" id="phoneList">
                        <div class="empty-state">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
                                <line x1="12" y1="18" x2="12.01" y2="18"/>
                            </svg>
                            <p>No phones discovered yet</p>
                            <p class="text-muted">Click "Scan Network" to find phones on your network</p>
                        </div>
                    </div>
                </div>
            </section>


            <!-- Streams Panel -->
            <section class="panel streams-panel">
                <div class="panel-header">
                    <h2>Streams</h2>
                    <div class="stream-actions">
                        <button class="btn btn-secondary btn-sm" id="enableAllBtn">Enable All</button>
                        <button class="btn btn-secondary btn-sm" id="disableAllBtn">Disable All</button>
                    </div>
                </div>
                <div class="panel-body">
                    <div class="streams-grid" id="streamsGrid">
                        <!-- Stream cards will be inserted here -->
                    </div>
                </div>
            </section>

            <!-- Status Panel -->
            <section class="panel status-panel">
                <div class="panel-header">
                    <h2>Status</h2>
                </div>
                <div class="panel-body">
                    <div class="status-grid">
                        <div class="status-card">
                            <div class="status-label">Screen</div>
                            <div class="status-value" id="screenStatus">--</div>
                            <div class="status-meta" id="screenMeta">0 FPS</div>
                        </div>
                        <div class="status-card">
                            <div class="status-label">Camera</div>
                            <div class="status-value" id="cameraStatus">--</div>
                            <div class="status-meta" id="cameraMeta">0 FPS</div>
                        </div>
                        <div class="status-card">
                            <div class="status-label">Mic</div>
                            <div class="status-value" id="micStatus">--</div>
                            <div class="status-meta" id="micMeta">0 kbps</div>
                        </div>
                        <div class="status-card">
                            <div class="status-label">Speaker</div>
                            <div class="status-value" id="speakerStatus">--</div>
                            <div class="status-meta" id="speakerMeta">0 kbps</div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>

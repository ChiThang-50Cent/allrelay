<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllRelay Remote</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body data-page="remote">
    <main class="remote-popup-shell">
        <section class="remote-popup-screen" id="screenPanel">
            <canvas id="screenCanvas" class="screen-canvas"></canvas>
            <div class="screen-placeholder remote-popup-placeholder" id="screenPlaceholder">
                <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                    <line x1="8" y1="21" x2="16" y2="21"/>
                    <line x1="12" y1="17" x2="12" y2="21"/>
                </svg>
                <p>Connecting to Android screen…</p>
            </div>
            <div id="screenFPS" class="remote-popup-fps"></div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>

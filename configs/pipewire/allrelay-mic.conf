# AllRelay Phone Microphone — PipeWire RTP source config
#
# This creates a virtual microphone source on the Ubuntu PC
# that receives Opus-encoded audio from the Android phone's mic.
#
# Audio flow: Phone mic → Opus encode → UDP :5002 → this module → PipeWire source
#
# Install to: ~/.config/pipewire/pipewire.conf.d/30-allrelay-mic.conf
# Or system-wide: /etc/pipewire/pipewire.conf.d/30-allrelay-mic.conf
#
# After installation, restart PipeWire:
#   systemctl --user restart pipewire pipewire-pulse

context.modules = [
  {
    name = libpipewire-module-rtp-source
    args = {
      # Listen for incoming RTP stream from phone
      source.ip          = "0.0.0.0"
      source.port        = 5002

      # Session configuration
      sess.latency.msec  = 20
      sess.media         = "opus"

      # Audio format: 48kHz mono 16-bit signed little-endian
      audio.format       = "S16LE"
      audio.rate         = 48000
      audio.channels     = 1
      audio.position     = [ MONO ]

      # Stream properties — visible in GNOME Settings / KDE Audio
      stream.props = {
        media.class       = "Audio/Source/Virtual"
        node.name         = "allrelay-mic"
        node.description  = "AllRelay Phone Microphone"
        node.virtual      = false
        priority.session  = 1000
      }
    }
  }
]

# AllRelay Phone Speaker — PipeWire RTP sink config
#
# This creates a virtual speaker sink on the Ubuntu PC
# that sends Opus-encoded audio to the Android phone's speaker.
#
# Audio flow: PipeWire apps → this sink → Opus encode → UDP :5003 → phone speaker
#
# Note: The destination.ip must be set to the phone's actual IP address.
# Use the allrelay-server to dynamically generate this config with the
# correct phone IP, or update it manually.
#
# Install to: ~/.config/pipewire/pipewire.conf.d/30-allrelay-speaker.conf
# Or system-wide: /etc/pipewire/pipewire.conf.d/30-allrelay-speaker.conf
#
# After installation, restart PipeWire:
#   systemctl --user restart pipewire pipewire-pulse

context.modules = [
  {
    name = libpipewire-module-rtp-sink
    args = {
      # Send RTP stream to phone
      # REPLACE_ME with the phone's actual IP (e.g., 192.168.1.100)
      destination.ip      = "REPLACE_ME"
      destination.port    = 5003

      # Session configuration
      sess.latency.msec   = 20
      sess.media          = "opus"

      # Audio format: 48kHz mono 16-bit signed little-endian
      # Note: PC stereo audio is downmixed to mono for phone speaker
      audio.format        = "S16LE"
      audio.rate          = 48000
      audio.channels      = 1
      audio.position      = [ MONO ]

      # Stream properties — visible in GNOME Settings / KDE Audio
      stream.props = {
        media.class       = "Audio/Sink"
        node.name         = "allrelay-speaker"
        node.description  = "AllRelay Phone Speaker"
        priority.session  = 1000
      }
    }
  }
]
